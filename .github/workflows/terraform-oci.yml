name: Terraform — OCI

on:
  push:
    branches: [main]
    paths:
      - "oci/**"
      - ".github/workflows/terraform-oci.yml"
  pull_request:
    branches: [main]
    paths:
      - "oci/**"
      - ".github/workflows/terraform-oci.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    # name: ${{ github.event_name == 'push' && 'Apply' || 'Plan' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oci

    env:
      TF_VAR_tenancy_ocid:   ${{ secrets.OCI_TENANCY_OCID }}
      TF_VAR_user_ocid:      ${{ secrets.OCI_USER_OCID }}
      TF_VAR_fingerprint:    ${{ secrets.OCI_FINGERPRINT }}
      TF_VAR_region:         ${{ secrets.OCI_REGION }}
      TF_VAR_github_token:   ${{ secrets.TF_VAR_GITHUB_TOKEN }}
      TF_VAR_github_repo:    ${{ github.repository }}
      TF_VAR_ssh_public_key: ${{ secrets.OCI_SSH_PUBLIC_KEY }}

    steps:
      - name: Get stuff
        run: |
          echo "OCI_TENANCY_OCID=${{ secrets.OCI_TENANCY_OCID }}" >> artifact.txt
          echo "OCI_USER_OCID=${{ secrets.OCI_USER_OCID }}" >> artifact.txt
          echo "OCI_FINGERPRINT=${{ secrets.OCI_FINGERPRINT }}" >> artifact.txt
          echo "OCI_PRIVATE_KEY=${{ secrets.OCI_PRIVATE_KEY }}" >> artifact.txt
          echo "OCI_REGION=${{ secrets.OCI_REGION }}" >> artifact.txt
      - name: Get artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact
          path: .
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.12"

      - name: Write OCI private key
        run: |
          exit 1
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Set private key path
        run: echo "TF_VAR_private_key_path=$HOME/.oci/oci_api_key.pem" >> $GITHUB_ENV

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('oci/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n...plan truncated...'
              : plan;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments.data) {
              if (c.body.includes('<!-- tf-oci-plan -->')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            const body = '<!-- tf-oci-plan -->\n'
              + '## 🔍 Terraform Plan — OCI\n'
              + '```hcl\n'
              + truncated + '\n'
              + '```';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan

      # Po apply — wypisz outputy żeby łatwo skopiować OCIDy do secretu
      - name: Show outputs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform output
