name: OCI Runners — Start/Stop Schedule

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC = 04:00 PL lato / 03:00 PL zima → START
    - cron: "0 20 * * *"  # 20:00 UTC = 22:00 PL lato / 21:00 PL zima → STOP
  workflow_dispatch:
    inputs:
      action:
        description: "Akcja do wykonania"
        required: true
        type: choice
        options: [start, stop]

jobs:
  manage-runners:
    runs-on: ubuntu-latest
    env:
      OCI_CLI_USER:        ${{ secrets.OCI_USER_OCID }}
      OCI_CLI_TENANCY:     ${{ secrets.OCI_TENANCY_OCID }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY }}
      OCI_CLI_REGION:      ${{ secrets.OCI_REGION }}

    steps:
      - name: Install OCI CLI
        run: pip install oci-cli --quiet

      - name: Determine action
        id: action
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=${{ inputs.action }}" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%H)" = "02" ]; then
            echo "action=start" >> $GITHUB_OUTPUT
          else
            echo "action=stop" >> $GITHUB_OUTPUT
          fi

      - name: Execute action on all runners
        run: |
          ACTION="${{ steps.action.outputs.action }}"
          # START → OCI action: START | STOP → OCI action: SOFTSTOP
          OCI_ACTION=$([ "$ACTION" = "start" ] && echo "START" || echo "SOFTSTOP")
          
          echo "Executing $OCI_ACTION on all runners..."
          
          for OCID in ${{ secrets.OCI_RUNNER_INSTANCE_OCIDS }}; do
            echo "  → $OCID"
            oci compute instance action \
              --instance-id "$OCID" \
              --action "$OCI_ACTION" \
              --wait-for-state RUNNING \
              --wait-for-state STOPPED \
              --max-wait-seconds 120 2>/dev/null || true
          done
          
          echo "Done — action: $OCI_ACTION"
